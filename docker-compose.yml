# ============================================================
# OIL & GAS OPERATIONS - DOCKER COMPOSE
# Orchestrates the pipeline container
# ============================================================

version: '3.8'

services:
  pipeline:
    build: .
    container_name: oil_gas_pipeline
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./monitoring:/app/monitoring
      - ./database:/app/database
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m Scripts.run_pipeline

